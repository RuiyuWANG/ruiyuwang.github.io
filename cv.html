	<link rel="stylesheet" href="css/portfolio.css?v=template-20260626">
	<script src="js/template-editor.js?v=template-20260626" defer></script>

<body class="portfolio-site">
	<header class="site-header" aria-label="Primary navigation">
		<a class="brand" href="index.html" aria-label="Template homepage">
			<span class="brand-mark" data-editable="brand.initials">AT</span>
			<span data-editable="brand.name">Academic Template</span>
		</a>
		<nav class="site-nav">
			<a href="publications.html">Publications</a>
			<a href="cv.html" aria-current="page">CV</a>
			<a href="life.html">Life</a>
			<a href="index.html#contact">Contact</a>

	<main class="cv-page-main">
		<section class="page-hero cv-page-hero" aria-labelledby="cv-title">
			<p class="eyebrow">Curriculum Vitae</p>
			<h1 id="cv-title" data-editable="cv.title">CV</h1>
			<p data-editable="cv.intro">A scrollable CV page rendered from SVG pages. Replace the demo SVGs in <code>images/cv-pages</code> with your exported CV pages.</p>
			<div class="cv-actions">
				<a class="section-link" href="index.html">Back to homepage</a>
			</div>
		</section>

		<section class="cv-viewer-section" aria-label="Curriculum vitae document">
			<div class="cv-page-stack">
				<img class="cv-page-image" src="images/cv-pages/cv-1.svg" alt="Demo CV page 1" width="612" height="792">
				<img class="cv-page-image" src="images/cv-pages/cv-2.svg" alt="Demo CV page 2" width="612" height="792" loading="lazy">
			</div>
			<p class="cv-fallback">To add a PDF download, place a public PDF in <code>pdfs/</code> and add a link in this section.</p>
		</section>
	</main>
