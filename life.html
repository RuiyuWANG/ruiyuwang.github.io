<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Demo photo gallery page for the Academic Portfolio Template.">
	<meta name="theme-color" content="#ffffff">

	<title>Life | Academic Portfolio Template</title>
	<link rel="icon" href="favicon.svg" type="image/svg+xml">

	<link rel="preload" as="image" href="images/oc/demo-wide.svg">
	<link rel="stylesheet" href="css/portfolio.css?v=template-20260626-blog">
	<script src="js/site.js?v=template-20260626-blog" defer></script>
	<script src="js/template-editor.js?v=template-20260626-blog" defer></script>
</head>

<body class="portfolio-site">
	<header class="site-header" aria-label="Primary navigation">
		<a class="brand" href="index.html" aria-label="Template homepage">
			<span class="brand-mark" data-editable="brand.initials">AT</span>
			<span data-editable="brand.name">Academic Template</span>
		</a>
		<nav class="site-nav">
			<a href="publications.html">Publications</a>
			<a href="cv.html">CV</a>
			<a href="life.html" aria-current="page">Life</a>
			<a href="blog.html">Blog</a>
			<a href="index.html#contact">Contact</a>
		</nav>
	</header>

	<main class="life-page-main">
		<section class="page-hero life-page-hero" aria-labelledby="life-title">
			<p class="eyebrow">Gallery</p>
			<h1 id="life-title" data-editable="life.title">Photo Drops</h1>
			<p data-editable="life.intro">A public photo gallery generated from files in <code>images/oc</code>. Replace these placeholders with your own public images and rerun <code>npm run build:life</code>.</p>
		</section>

		<section class="life-photo-section" aria-label="Daily life photo collection">
			<!-- Generated by scripts/build-life-gallery.js. Edit images/oc and rerun the script. -->
			<a class="life-photo life-photo-wide" href="images/oc/demo-wide.svg" data-lightbox-src="images/oc/demo-wide.svg" data-lightbox-alt="Gallery photo">
				<img src="images/oc/demo-wide.svg" alt="Gallery photo" width="1400" height="520" decoding="async" fetchpriority="high">
			</a>
			<div class="life-photo-stack">
				<div class="life-photo-column" data-gallery-column="1">
					<a class="life-photo" href="images/oc/demo-01.svg" data-lightbox-src="images/oc/demo-01.svg" data-lightbox-alt="Gallery photo">
						<img src="images/oc/demo-01.svg" alt="Gallery photo" width="900" height="1200" decoding="async">
					</a>
				</div>
				<div class="life-photo-column" data-gallery-column="2">
					<a class="life-photo" href="images/oc/demo-03.svg" data-lightbox-src="images/oc/demo-03.svg" data-lightbox-alt="Gallery photo">
						<img src="images/oc/demo-03.svg" alt="Gallery photo" width="900" height="1100" decoding="async">
					</a>
				</div>
				<div class="life-photo-column" data-gallery-column="3">
					<a class="life-photo" href="images/oc/demo-04.svg" data-lightbox-src="images/oc/demo-04.svg" data-lightbox-alt="Gallery photo">
						<img src="images/oc/demo-04.svg" alt="Gallery photo" width="1100" height="900" decoding="async">
					</a>
				</div>
				<div class="life-photo-column" data-gallery-column="4">
					<a class="life-photo" href="images/oc/demo-02.svg" data-lightbox-src="images/oc/demo-02.svg" data-lightbox-alt="Gallery photo">
						<img src="images/oc/demo-02.svg" alt="Gallery photo" width="1200" height="900" decoding="async">
					</a>
				</div>
			</div>
		</section>
	</main>

	<div class="photo-lightbox" data-photo-lightbox role="dialog" aria-modal="true" aria-label="Life photo preview" hidden>
		<button class="photo-lightbox-backdrop" type="button" data-lightbox-close aria-label="Close photo preview"></button>
		<div class="photo-lightbox-frame">
			<img class="photo-lightbox-image" data-lightbox-image src="" alt="">
			<button class="photo-lightbox-close" type="button" data-lightbox-close aria-label="Close photo preview">
				<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12 19 6.4 17.6 5 12 10.6 6.4 5Z"/></svg>
			</button>
		</div>
	</div>
</body>
</html>
